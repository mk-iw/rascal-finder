<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Detector</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; color: white; }
        #video { width: 100%; height: auto; display: none; }
        #canvas { width: 100vw; height: 100vh; object-fit: contain; }
        #info { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.5); padding: 10px; }
    </style>
</head>
<body>
    <div id="info">準備中...</div>
    <video id="video" autoplay playsinline muted style="width: 1px; height: 1px; opacity: 0;"></video>
    <canvas id="canvas"></canvas>
    <script src="script.js"></script>
</body>
</html>
